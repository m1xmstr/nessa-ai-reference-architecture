apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: amd-unified-memory-llama
  namespace: private-ai-app
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    nodeSelector:
      node-role.kubernetes.io/ai-worker: ""
    containers:
    - name: kserve-container
      image: quay.io/example/llama-cpp:server-vulkan
      args:
      - --model
      - /models/qwen2.5-7b-instruct-q4_k_m.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --n-gpu-layers
      - "99"
      - --flash-attn
      - auto
      ports:
      - containerPort: 8080
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "16"
          memory: 80Gi
      volumeMounts:
      - name: model-cache
        mountPath: /models
    volumes:
    - name: model-cache
      emptyDir: {}
