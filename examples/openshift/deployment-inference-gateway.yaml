apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference-gateway
  namespace: private-ai-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-inference-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-inference-gateway
    spec:
      nodeSelector:
        node-role.kubernetes.io/ai-worker: ""
      containers:
      - name: gateway
        image: quay.io/example/private-ai-web:latest
        command:
        - python
        - /opt/app/inference_gateway.py
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: app-config
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
